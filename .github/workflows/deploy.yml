name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Worker with curl
        env:
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SCRIPT_NAME: cf-vless-worker
        run: |
          # 1. 进入构建目录
          cd dist
          
          # 2. 确保文件名为 _worker.js (Pages 的入口规范)
          # 如果已经是这个名字则跳过
          
          # 3. 直接调用 Pages 的 Direct Upload 接口
          # 注意：这是最简单的一种同步上传方式，适合小项目
          curl -X POST "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT_NAME/deployments" \
            -H "Authorization: Bearer $API_TOKEN" \
            -F "file=@_worker.js" \
            -F "project_config={\"runtime_config\":{\"compatibility_date\":\"2024-01-01\"}}"
