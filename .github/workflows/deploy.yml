name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main  # 只有在 main 分支有变动时触发
  workflow_dispatch: # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 如果你的项目需要构建（例如 npm install && npm run build），请取消下面注释
      # - name: Install Dependencies
      #   run: npm install

      # - name: Build Project
      #   run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=你的项目名称
          # 如果你有构建后的目录（如 dist 或 build），将上面的 "." 改为该目录路径
